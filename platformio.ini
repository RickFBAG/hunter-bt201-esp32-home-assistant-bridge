[env:waveshare_esp32_c6_touch]
platform = espressif32
board = esp32-c6-devkitc-1
framework = espidf
monitor_speed = 115200
build_type = release
board_upload.flash_size = 8MB
board_build.partitions = partitions_bridge.csv
build_flags =
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D BRIDGE_PROJECT_VERSION=\"1.0.0\"
test_build_src = yes
